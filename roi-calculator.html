<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROI Calculator | Window Depot USA Milwaukee</title>
  <meta name="description" content="Window Depot USA ROI Calculator — See how new windows pay for themselves.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Nunito+Sans:opsz,wght@6..12,300;6..12,400;6..12,600;6..12,700;6..12,800&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#0A1628;--navy2:#1A2F50;--blue:#1565C0;
      --gold:#B8900A;--gold2:#D4AF37;--gold-pale:#FDF8EC;
      --ivory:#FAFAF6;--cream:#F0EDE5;--white:#FFFFFF;
      --gray:#64748B;--gray-mid:#94A3B8;--border:#E5E0D5;
      --shadow-sm:0 1px 3px rgba(10,22,40,0.08),0 1px 2px rgba(10,22,40,0.05);
      --shadow-md:0 4px 16px rgba(10,22,40,0.10),0 2px 6px rgba(10,22,40,0.06);
      --shadow-lg:0 20px 60px rgba(10,22,40,0.12),0 8px 24px rgba(10,22,40,0.08);
      --shadow-xl:0 40px 80px rgba(10,22,40,0.14),0 16px 40px rgba(10,22,40,0.08);
      --radius:16px;
    }
    html{scroll-behavior:smooth}
    body{
      font-family:"Nunito Sans",sans-serif;
      background:var(--navy);
      color:var(--white);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      -webkit-font-smoothing:antialiased;
      padding:24px 16px;
    }

    /* Logo */
    .logo-bar{
      width:100%;
      max-width:640px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:8px 0 16px;
    }
    .logo-bar img{
      height:50px;
      width:auto;
    }

    /* Heading */
    .page-heading{
      font-family:"Cormorant Garant",serif;
      font-size:28px;
      font-weight:700;
      text-align:center;
      line-height:1.3;
      max-width:540px;
      margin:0 auto 32px;
      color:var(--white);
    }
    .page-heading em{
      font-style:italic;
      color:var(--gold2);
    }

    /* Card */
    .calc-card{
      width:100%;
      max-width:640px;
      background:var(--navy2);
      border:1px solid rgba(212,175,55,0.2);
      border-radius:var(--radius);
      box-shadow:var(--shadow-xl);
      padding:32px 28px;
    }

    /* Section label */
    .section-label{
      font-family:"Bebas Neue",sans-serif;
      font-size:13px;
      letter-spacing:0.15em;
      text-transform:uppercase;
      color:var(--gray-mid);
      margin-bottom:16px;
    }

    /* Row */
    .calc-row{
      margin-bottom:24px;
    }
    .calc-row:last-child{
      margin-bottom:0;
    }
    .calc-row label{
      display:block;
      font-family:"Bebas Neue",sans-serif;
      font-size:14px;
      letter-spacing:0.12em;
      text-transform:uppercase;
      color:var(--gray-mid);
      margin-bottom:6px;
    }
    .calc-row .helper{
      font-size:12px;
      color:var(--gray);
      margin-top:4px;
    }

    /* Input field */
    .currency-input{
      width:100%;
      background:rgba(255,255,255,0.06);
      border:none;
      border-bottom:2px solid rgba(212,175,55,0.3);
      color:var(--white);
      font-family:"Cormorant Garant",serif;
      font-size:28px;
      font-weight:700;
      padding:12px 16px;
      border-radius:8px 8px 0 0;
      outline:none;
      transition:border-color 0.3s, background 0.3s;
    }
    .currency-input:focus{
      border-bottom-color:var(--gold2);
      background:rgba(255,255,255,0.1);
    }
    .currency-input::placeholder{
      color:rgba(255,255,255,0.25);
      font-size:22px;
    }

    /* Auto-calculated display */
    .auto-display{
      width:100%;
      background:rgba(255,255,255,0.03);
      border:none;
      border-bottom:1px solid rgba(255,255,255,0.08);
      color:var(--gold2);
      font-family:"Cormorant Garant",serif;
      font-size:28px;
      font-weight:700;
      padding:12px 16px;
      border-radius:8px 8px 0 0;
      transition:transform 0.3s;
    }
    .auto-display.highlight{
      transform:scale(1.03);
    }

    /* Divider */
    .gold-divider{
      height:2px;
      background:linear-gradient(90deg, var(--gold), var(--gold2), var(--gold));
      border:none;
      margin:28px 0;
      border-radius:2px;
    }

    /* ROI Result */
    .roi-result-row{
      text-align:center;
      padding:20px 0 8px;
    }
    .roi-result-row label{
      font-family:"Bebas Neue",sans-serif;
      font-size:16px;
      letter-spacing:0.15em;
      text-transform:uppercase;
      color:var(--gold);
      margin-bottom:8px;
      display:block;
    }
    .roi-result-row .formula{
      font-size:12px;
      color:var(--gray-mid);
      margin-bottom:12px;
    }
    .roi-value{
      font-family:"Cormorant Garant",serif;
      font-size:48px;
      font-weight:700;
      color:var(--gold2);
      transition:transform 0.3s;
      display:inline-block;
    }
    .roi-value.highlight{
      transform:scale(1.08);
    }
    .roi-value.negative{
      color:#ef4444;
    }

    /* Monthly helper */
    .helper-section{
      margin-bottom:24px;
      padding:16px 20px;
      background:rgba(212,175,55,0.08);
      border:1px solid rgba(212,175,55,0.15);
      border-radius:12px;
    }
    .helper-section label{
      font-family:"Bebas Neue",sans-serif;
      font-size:13px;
      letter-spacing:0.12em;
      text-transform:uppercase;
      color:var(--gold);
      margin-bottom:6px;
      display:block;
    }
    .helper-input{
      width:100%;
      background:rgba(255,255,255,0.08);
      border:none;
      border-bottom:2px solid var(--gold);
      color:var(--white);
      font-family:"Cormorant Garant",serif;
      font-size:24px;
      font-weight:700;
      padding:10px 14px;
      border-radius:8px 8px 0 0;
      outline:none;
      transition:border-color 0.3s, background 0.3s;
    }
    .helper-input:focus{
      border-bottom-color:var(--gold2);
      background:rgba(255,255,255,0.12);
    }
    .helper-input::placeholder{
      color:rgba(255,255,255,0.3);
      font-size:18px;
    }
    .helper-section .helper{
      font-size:12px;
      color:var(--gold);
      opacity:0.7;
      margin-top:4px;
    }

    /* Row numbering */
    .row-num{
      display:inline-block;
      width:22px;
      height:22px;
      line-height:22px;
      text-align:center;
      border-radius:50%;
      background:rgba(212,175,55,0.15);
      color:var(--gold2);
      font-family:"Nunito Sans",sans-serif;
      font-size:11px;
      font-weight:700;
      margin-right:6px;
      vertical-align:middle;
    }

    /* Reset button */
    .reset-btn{
      display:block;
      margin:24px auto 0;
      background:transparent;
      border:1px solid rgba(255,255,255,0.15);
      color:var(--gray-mid);
      font-family:"Nunito Sans",sans-serif;
      font-size:13px;
      padding:8px 24px;
      border-radius:8px;
      cursor:pointer;
      transition:all 0.3s;
    }
    .reset-btn:hover{
      border-color:var(--gold);
      color:var(--gold);
    }

    /* Responsive */
    @media(max-width:600px){
      body{padding:16px 12px}
      .page-heading{font-size:22px;margin-bottom:24px}
      .calc-card{padding:24px 18px}
      .currency-input,.auto-display{font-size:24px;padding:10px 12px}
      .helper-input{font-size:20px}
      .roi-value{font-size:40px}
    }
    @media(min-width:768px){
      .page-heading{font-size:32px}
      body{padding:40px 24px}
    }
  </style>
</head>
<body>

  <div class="logo-bar">
    <img src="https://windowdepotmilwaukee.com/wp-content/uploads/2021/03/WDUSA_MilwaukeeLogo.png"
         alt="Window Depot USA Milwaukee"
         onerror="this.style.display='none'">
  </div>

  <h1 class="page-heading">
    Windows are an <em>investment</em>, and will absolutely <em>pay for themselves</em>
  </h1>

  <div class="calc-card">

    <!-- Monthly Bill Helper -->
    <div class="helper-section">
      <label for="monthlyBill">Quick Entry: Monthly Energy Bill</label>
      <input type="text" id="monthlyBill" class="helper-input"
             inputmode="decimal" placeholder="e.g. $220">
      <div class="helper">Auto-fills 10-Year Energy Costs (monthly &times; 12 &times; 10)</div>
    </div>

    <p class="section-label">Investment Inputs</p>

    <!-- Row 1: 10-Year Energy Costs (INPUT) -->
    <div class="calc-row">
      <label for="energyCost"><span class="row-num">1</span> 10-Year Energy Costs</label>
      <input type="text" id="energyCost" class="currency-input"
             inputmode="decimal" placeholder="$0">
      <div class="helper">Total energy spend over 10 years</div>
    </div>

    <!-- Row 3: Window Depot Investment (INPUT) -->
    <div class="calc-row">
      <label for="investment"><span class="row-num">3</span> Window Depot Investment</label>
      <input type="text" id="investment" class="currency-input"
             inputmode="decimal" placeholder="$0">
      <div class="helper">Your quoted price for new windows</div>
    </div>

    <p class="section-label" style="margin-top:28px">Calculated Results</p>

    <!-- Row 2: 10-Year 34% Energy Savings (AUTO) -->
    <div class="calc-row">
      <label><span class="row-num">2</span> 10-Year 34% Energy Savings</label>
      <div class="auto-display" id="energySavings">$0</div>
    </div>

    <!-- Row 4: Cost vs. Value — Investment 80% (AUTO) -->
    <div class="calc-row">
      <label><span class="row-num">4</span> Cost vs. Value (Investment 80%)</label>
      <div class="auto-display" id="costValue">$0</div>
    </div>

    <hr class="gold-divider">

    <!-- Row 5: Return On Your Investment (AUTO) -->
    <div class="roi-result-row">
      <label><span class="row-num">5</span> Return On Your Investment</label>
      <div class="formula">(#2 + #4 &minus; #3)</div>
      <div class="roi-value" id="roiResult">$0</div>
    </div>

    <button class="reset-btn" id="resetBtn">Clear All</button>
  </div>

  <script>
    const monthlyBillEl = document.getElementById('monthlyBill');
    const energyCostEl = document.getElementById('energyCost');
    const investmentEl = document.getElementById('investment');
    const energySavingsEl = document.getElementById('energySavings');
    const costValueEl = document.getElementById('costValue');
    const roiResultEl = document.getElementById('roiResult');
    const resetBtn = document.getElementById('resetBtn');

    function fmt(num) {
      const rounded = Math.round(num);
      return (rounded < 0 ? '-$' : '$') + Math.abs(rounded).toLocaleString();
    }

    function parse(str) {
      return parseFloat(str.replace(/[^0-9.]/g, '')) || 0;
    }

    function calculate() {
      const energyCost = parse(energyCostEl.value);
      const savings = energyCost * 0.34;
      const investment = parse(investmentEl.value);
      const costValue = investment * 0.80;
      const roi = savings + costValue - investment;

      energySavingsEl.textContent = fmt(savings);
      costValueEl.textContent = fmt(costValue);
      roiResultEl.textContent = fmt(roi);

      roiResultEl.classList.toggle('negative', roi < 0);

      // Highlight animation
      energySavingsEl.classList.add('highlight');
      costValueEl.classList.add('highlight');
      roiResultEl.classList.add('highlight');
      setTimeout(function() {
        energySavingsEl.classList.remove('highlight');
        costValueEl.classList.remove('highlight');
        roiResultEl.classList.remove('highlight');
      }, 300);
    }

    function formatInput(input) {
      var val = parse(input.value);
      if (val > 0) input.value = fmt(val);
    }

    function clearFormat(input) {
      var val = parse(input.value);
      if (val > 0) input.value = val;
    }

    energyCostEl.addEventListener('input', calculate);
    investmentEl.addEventListener('input', calculate);

    energyCostEl.addEventListener('blur', function() { formatInput(energyCostEl); });
    investmentEl.addEventListener('blur', function() { formatInput(investmentEl); });
    energyCostEl.addEventListener('focus', function() { clearFormat(energyCostEl); });
    investmentEl.addEventListener('focus', function() { clearFormat(investmentEl); });

    // Monthly bill helper
    monthlyBillEl.addEventListener('input', function() {
      var monthly = parse(monthlyBillEl.value);
      var tenYear = monthly * 12 * 10;
      if (monthly > 0) {
        energyCostEl.value = fmt(tenYear);
      } else {
        energyCostEl.value = '';
      }
      calculate();
    });
    monthlyBillEl.addEventListener('blur', function() { formatInput(monthlyBillEl); });
    monthlyBillEl.addEventListener('focus', function() { clearFormat(monthlyBillEl); });

    // Reset
    resetBtn.addEventListener('click', function() {
      monthlyBillEl.value = '';
      energyCostEl.value = '';
      investmentEl.value = '';
      energySavingsEl.textContent = '$0';
      costValueEl.textContent = '$0';
      roiResultEl.textContent = '$0';
      roiResultEl.classList.remove('negative');
    });
  </script>

</body>
</html>
