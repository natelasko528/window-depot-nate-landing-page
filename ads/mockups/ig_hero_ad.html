<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Window Depot USA of Milwaukee — Spring Energy Savings Ad</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="margin:0;padding:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;">

<div style="width:1080px;height:1080px;position:relative;overflow:hidden;font-family:'Nunito Sans',sans-serif;">

  <!-- TOP GOLD BAND -->
  <div style="width:100%;height:4px;background:#D4AF37;position:absolute;top:0;left:0;z-index:2;"></div>

  <!-- MAIN NAVY GRADIENT BACKGROUND -->
  <div style="width:100%;height:100%;background:linear-gradient(180deg,#0A1628 0%,#162847 100%);position:absolute;top:0;left:0;"></div>

  <!-- RADIAL GLOW BEHIND HEADLINE -->
  <div style="position:absolute;top:260px;left:50%;transform:translateX(-50%);width:800px;height:400px;background:radial-gradient(ellipse at center,rgba(30,55,100,0.55) 0%,rgba(22,40,71,0.2) 45%,transparent 70%);z-index:1;pointer-events:none;"></div>

  <!-- CONTENT WRAPPER -->
  <div style="position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;">

    <!-- BRAND IDENTIFIER -->
    <div style="margin-top:48px;font-family:'Nunito Sans',sans-serif;font-size:15px;font-weight:700;color:#D4AF37;letter-spacing:4.5px;text-transform:uppercase;text-align:center;">
      Window Depot USA of Milwaukee
    </div>

    <!-- HERO HEADLINE -->
    <div style="margin-top:80px;font-family:'Bebas Neue',sans-serif;font-size:78px;color:#FFFFFF;text-align:center;line-height:1.05;letter-spacing:2px;text-transform:uppercase;padding:0 60px;max-width:960px;">
      Stop Paying<br>for Drafty Windows
    </div>

    <!-- GOLD DIVIDER -->
    <div style="margin-top:28px;width:60px;height:3px;background:#D4AF37;border-radius:2px;"></div>

    <!-- SUBHEADLINE -->
    <div style="margin-top:26px;font-family:'Nunito Sans',sans-serif;font-size:26px;color:#FFFFFF;text-align:center;font-weight:600;letter-spacing:0.5px;">
      Triple-Pane at Dual-Pane Prices
    </div>

    <!-- VALUE PROPS -->
    <div style="margin-top:44px;display:flex;flex-direction:column;align-items:center;gap:18px;">
      <div style="font-family:'Nunito Sans',sans-serif;font-size:22px;color:#FFFFFF;text-align:center;font-weight:400;">
        <span style="color:#D4AF37;font-weight:700;margin-right:10px;font-size:24px;">&#10003;</span>Save up to 30% on energy bills
      </div>
      <div style="font-family:'Nunito Sans',sans-serif;font-size:22px;color:#FFFFFF;text-align:center;font-weight:400;">
        <span style="color:#D4AF37;font-weight:700;margin-right:10px;font-size:24px;">&#10003;</span>FREE estimate — locked for 1 full year
      </div>
      <div style="font-family:'Nunito Sans',sans-serif;font-size:22px;color:#FFFFFF;text-align:center;font-weight:400;">
        <span style="color:#D4AF37;font-weight:700;margin-right:10px;font-size:24px;">&#10003;</span>$500 Gift Card included
      </div>
    </div>

    <!-- SPACER TO PUSH CTA DOWN -->
    <div style="flex:1;"></div>

    <!-- CTA SECTION -->
    <div style="width:100%;height:120px;background:linear-gradient(180deg,#D4AF37 0%,#B8900A 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;">
      <div style="font-family:'Nunito Sans',sans-serif;font-size:26px;font-weight:800;color:#0A1628;text-align:center;letter-spacing:0.3px;">
        Book Your FREE Estimate with Nate
      </div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:38px;color:#0A1628;text-align:center;letter-spacing:1.5px;line-height:1.15;">
        (414) 312-5213
      </div>
      <div style="font-family:'Nunito Sans',sans-serif;font-size:13px;font-weight:600;color:#0A1628;text-align:center;letter-spacing:1px;opacity:0.7;">
        windowdepotmilwaukee.com
      </div>
    </div>

    <!-- BOTTOM NAVY BAND -->
    <div style="width:100%;height:4px;background:#0A1628;flex-shrink:0;"></div>

  </div>

</div>

</body>
</html>
